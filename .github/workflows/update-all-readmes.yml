name: Update All READMEs

on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  update-all-readmes:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout .github
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install requests deep-translator

      - name: Update READMEs in all repositories
        env:
          REPO_SYNC_TOKEN: ${{ secrets.REPO_SYNC_TOKEN || github.token }}
          GITHUB_TOKEN: ${{ github.token }}
          GITHUB_REPOSITORY_OWNER: ${{ github.repository_owner }}
        run: python scripts/update_all_readmes.py
