name: Сообщение об ошибке / Bug report
description: Сообщить о воспроизводимой проблеме / Report a reproducible problem
title: "[Bug]: "
labels:
  - bug
body:
  - type: markdown
    attributes:
      value: |
        [RU 🇷🇺](#) | [EN 🇬🇧](#)

        Сначала заполните русские поля. Английские подсказки указаны ниже для удобства.

        Fill in the Russian fields first. English hints are provided below for convenience.
  - type: textarea
    id: description
    attributes:
      label: Описание / Description
      description: Что произошло? / What happened?
      placeholder: |
        RU: Кратко опишите проблему.

        EN: Briefly describe the problem.
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: Шаги воспроизведения / Steps to reproduce
      description: Укажите точные шаги, чтобы воспроизвести проблему. / List the exact steps needed to reproduce the problem.
      placeholder: |
        RU:
        1. ...
        2. ...
        3. ...

        EN:
        1. ...
        2. ...
        3. ...
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Ожидаемое поведение / Expected behavior
      description: Что должно было произойти? / What did you expect to happen?
      placeholder: |
        RU: Опишите ожидаемый результат.

        EN: Describe the expected result.
  - type: textarea
    id: actual
    attributes:
      label: Фактическое поведение / Actual behavior
      description: Что произошло вместо этого? / What happened instead?
      placeholder: |
        RU: Опишите фактический результат.

        EN: Describe the actual result.
  - type: textarea
    id: logs
    attributes:
      label: Логи или скриншоты / Logs or screenshots
      description: Добавьте логи, скриншоты или другие полезные детали. / Add logs, screenshots, or other details if useful.
      render: shell
  - type: input
    id: environment
    attributes:
      label: Окружение / Environment
      description: ОС, версия приложения, устройство, браузер, прошивка или другой важный контекст. / OS, app version, device, browser, firmware, or other relevant context.
      placeholder: "RU/EN: OS, version, device, browser..."
