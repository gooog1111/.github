name: Bug report / Сообщение об ошибке
description: Report a reproducible problem / Сообщить о воспроизводимой проблеме
title: "[Bug]: "
labels:
  - bug
body:
  - type: textarea
    id: description
    attributes:
      label: Description / Описание
      description: What happened? / Что произошло?
      placeholder: |
        RU: Кратко опишите проблему.
        EN: Briefly describe the problem.
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce / Шаги воспроизведения
      description: List the exact steps needed to reproduce the problem. / Укажите точные шаги, чтобы воспроизвести проблему.
      placeholder: |
        RU:
        1. ...
        2. ...
        3. ...

        EN:
        1. ...
        2. ...
        3. ...
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior / Ожидаемое поведение
      description: What did you expect to happen? / Что должно было произойти?
      placeholder: |
        RU: Опишите ожидаемый результат.
        EN: Describe the expected result.
  - type: textarea
    id: actual
    attributes:
      label: Actual behavior / Фактическое поведение
      description: What happened instead? / Что произошло вместо этого?
      placeholder: |
        RU: Опишите фактический результат.
        EN: Describe the actual result.
  - type: textarea
    id: logs
    attributes:
      label: Logs or screenshots / Логи или скриншоты
      description: Add logs, screenshots, or other details if useful. / Добавьте логи, скриншоты или другие полезные детали.
      render: shell
  - type: input
    id: environment
    attributes:
      label: Environment / Окружение
      description: OS, app version, device, browser, firmware, or other relevant context. / ОС, версия приложения, устройство, браузер, прошивка или другой важный контекст.
      placeholder: "RU/EN: OS, version, device, browser..."
