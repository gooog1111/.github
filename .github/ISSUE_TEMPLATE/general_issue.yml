name: Общий вопрос / General issue
description: Задать вопрос или открыть общее обсуждение / Ask a question or open a general discussion
title: "[Question]: "
body:
  - type: markdown
    attributes:
      value: |
        [RU 🇷🇺](#) | [EN 🇬🇧](#)

        Сначала заполните русские поля. Английские подсказки указаны ниже для удобства.

        Fill in the Russian fields first. English hints are provided below for convenience.
  - type: textarea
    id: topic
    attributes:
      label: Тема / Topic
      description: Что вы хотите обсудить или спросить? / What would you like to discuss or ask?
      placeholder: |
        RU: Опишите вопрос, идею или ситуацию.

        EN: Describe the question, idea, or situation.
    validations:
      required: true
  - type: textarea
    id: context
    attributes:
      label: Контекст / Context
      description: Добавьте ссылки, примеры, скриншоты, логи или другие детали, если это полезно. / Add links, examples, screenshots, logs, or other details if useful.
